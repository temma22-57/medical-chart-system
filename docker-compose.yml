services:
  db:
    build:
      context: ./backend
      dockerfile: db/Dockerfile
    user: "0:0"
    environment:
      POSTGRES_DB: ${DB_NAME:-medical_chart}
      POSTGRES_USER: ${DB_USER:-medical_chart_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-medical_chart_password}
      POSTGRES_ENABLE_TLS: ${POSTGRES_ENABLE_TLS:-True}
      POSTGRES_TLS_CERT_DIR: /certs/postgres
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/certs/postgres/server.crt
      - -c
      - ssl_key_file=/certs/postgres/server.key
      - -c
      - ssl_ca_file=/certs/postgres/ca.crt
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./.local/certs/postgres:/certs/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-medical_chart_user} -d ${DB_NAME:-medical_chart}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-local-development-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DB_NAME: ${DB_NAME:-medical_chart}
      DB_USER: ${DB_USER:-medical_chart_user}
      DB_PASSWORD: ${DB_PASSWORD:-medical_chart_password}
      DB_HOST: db
      DB_PORT: 5432
      DB_SSLMODE: ${DB_SSLMODE:-verify-full}
      DB_SSLROOTCERT: /certs/postgres/ca.crt
      DB_SSLCERT: ${DB_SSLCERT:-}
      DB_SSLKEY: ${DB_SSLKEY:-}
      DB_STARTUP_MAX_ATTEMPTS: ${DB_STARTUP_MAX_ATTEMPTS:-30}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-no-reply@medical-chart.local}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:-}
      MFA_CODE_TTL_MINUTES: ${MFA_CODE_TTL_MINUTES:-10}
      MFA_RESEND_THROTTLE_SECONDS: ${MFA_RESEND_THROTTLE_SECONDS:-30}
      MFA_MAX_FAILED_ATTEMPTS: ${MFA_MAX_FAILED_ATTEMPTS:-5}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./.local/certs/postgres:/certs/postgres:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
