services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME:-medical_chart}
      POSTGRES_USER: ${DB_USER:-medical_chart_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-medical_chart_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-medical_chart_user} -d ${DB_NAME:-medical_chart}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-local-development-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DB_NAME: ${DB_NAME:-medical_chart}
      DB_USER: ${DB_USER:-medical_chart_user}
      DB_PASSWORD: ${DB_PASSWORD:-medical_chart_password}
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
